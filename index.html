<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NicoKlas - Woordsoorten Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Verdana:wght@400;700&display=swap');

        body {
            font-family: 'Verdana', sans-serif;
            /* Gevel licht greige */
            background-color: #e5e2db; 
        }

        /* Zijbalk styling */
        aside .config-container {
            /* Gevel donker greige */
            background-color: #d1cdc3; 
            border: 1px solid #000;
        }

        /* Input styling voor leesbaarheid */
        .strak-input, 
        select.strak-input, 
        input[type="number"].strak-input {
            border: 1px solid #000;
            border-radius: 0;
            padding: 0.5rem;
            font-family: 'Verdana', sans-serif;
            width: 100%;
            font-size: 0.875rem;
            background-color: #ffffff; 
        }

        .woord-blok {
            border-left: 3px solid #e5e7eb;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
            page-break-inside: avoid;
        }

        .underline-demo { text-decoration: underline; }
        .circle-demo { 
            border: 2px solid #000; 
            border-radius: 50%; 
            padding: 2px 8px; 
            margin: 0 2px;
            display: inline-block;
            line-height: 1;
        }
        .highlight-demo { background-color: #ffeb3b; padding: 2px 4px; }

        .example-box {
            border: 1px solid #000;
            padding: 15px;
            margin: 20px 0;
            background: #f9f9f9;
        }

        @media print {
            /* Verberg zijbalk en andere elementen met no-print */
            .no-print { display: none !important; }
            
            /* Spierwitte achtergrond bij printen */
            body { background: white !important; padding: 0 !important; }
            
            #werkblad-container { 
                box-shadow: none !important; 
                margin: 0 !important; 
                width: 100% !important;
                max-width: 100% !important;
                border: none !important;
            }
            .main-grid { display: block !important; }
        }

        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: #000; }
        input[type=range]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 0; background: #000; cursor: pointer; -webkit-appearance: none; margin-top: -7px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto container">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-8 main-grid">
            
            <aside class="no-print space-y-6">
                <div class="config-container p-6 shadow-sm">
                    <h2 class="text-xs font-bold uppercase tracking-widest mb-6 border-b border-black pb-2">Configuratie</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold uppercase mb-2 block">1. Woordsoorten</label>
                            <div class="text-[11px] space-y-1">
                                <label class="flex items-center gap-2"><input type="checkbox" id="lidwoord" checked class="accent-black"> Lidwoord</label>
                                <label class="flex items-center gap-2"><input type="checkbox" id="bijvoeglijk" checked class="accent-black"> Bijvoeglijk nw</label>
                                <label class="flex items-center gap-2"><input type="checkbox" id="zelfstandig" checked class="accent-black"> Zelfstandig nw</label>
                            </div>
                        </div>

                        <div>
                            <label class="text-xs font-bold uppercase mb-2 block">2. Aantal & Niveau</label>
                            <input type="number" id="aantalOefeningen" value="10" min="1" max="50" class="strak-input mb-2">
                            <select id="moeilijkheid" class="strak-input">
                                <option value="eenvoudig">Niveau 1 (Woordgroepen)</option>
                                <option value="makkelijk" selected>Niveau 2 (Gemiddeld)</option>
                                <option value="moeilijk">Niveau 3 (Moeilijk)</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-xs font-bold uppercase mb-2 block">3. Opmaak</label>
                            <div class="flex justify-between text-[10px] uppercase font-bold"><span>Grootte</span><span id="val-lettergrootte">16px</span></div>
                            <input type="range" id="lettergrootte" min="12" max="24" value="16" oninput="updateLiveStyle()" class="w-full mb-3">
                            
                            <div class="flex justify-between text-[10px] uppercase font-bold"><span>Regelafstand</span><span id="val-afstand">2.0</span></div>
                            <input type="range" id="afstand" min="1.5" max="3.5" step="0.1" value="2.0" oninput="updateLiveStyle()" class="w-full">
                        </div>

                        <div>
                            <label class="text-xs font-bold uppercase mb-2 block">4. Extra</label>
                            <div class="text-[11px] space-y-1">
                                <label class="flex items-center gap-2"><input type="checkbox" id="voorbeeld" checked class="accent-black"> Voorbeeld tonen</label>
                                <label class="flex items-center gap-2"><input type="checkbox" id="verbeterblad" class="accent-black"> Verbeterblad</label>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 space-y-3">
                        <button onclick="generateWorksheet()" class="w-full bg-black text-white text-xs font-bold uppercase tracking-widest py-4 hover:bg-gray-800 transition-colors">Genereer</button>
                        <button onclick="window.print()" class="w-full border border-black text-black text-xs font-bold uppercase tracking-widest py-4 hover:bg-gray-100 transition-colors">Print PDF</button>
                    </div>
                </div>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest text-center font-bold">CC BY-NC-SA 4.0 NicoKlas</p>
            </aside>

            <main id="werkblad-container" class="md:col-span-3 bg-white shadow-2xl min-h-[29.7cm] p-12 flex flex-col">
                <header class="border-b-2 border-black pb-4 mb-8 flex justify-between items-end">
                    <div>
                        <h1 class="text-3xl font-black uppercase tracking-tighter">Woordsoorten</h1>
                        <span id="subtitel-badge" class="bg-black text-white px-2 py-0.5 text-[10px] uppercase font-bold tracking-widest italic">Maak uw keuze</span>
                    </div>
                    <div class="text-[10px] font-bold uppercase text-gray-400 text-right">
                        Naam: ............................................................
                    </div>
                </header>

                <div id="worksheet-content" class="flex-grow">
                    <p class="text-center text-gray-400 mt-20 uppercase tracking-widest text-xs">Stel de configuratie in en klik op "Genereer"</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        const eenvoudigLijst = ["De rode appel", "Het grote boek", "Een snelle auto", "De blauwe lucht", "Het kleine kind", "Een warme jas", "De sterke man", "Het zachte kussen", "Een ronde tafel", "De jonge hond", "Het nieuwe huis", "Een dichte deur", "De hoge boom", "Het verse brood", "Een bruine beer", "De diepe zee", "Het witte laken", "Een scherp potlood", "De lange weg", "Het volle glas", "Een blije vogel", "De grijze muis", "Het open raam", "Een zware tas", "De koude sneeuw", "Het lichte jasje", "Een vreemde man", "De houten stoel", "Het korte haar", "Een rijpe banaan", "De dikke kat", "Het gouden horloge", "Een mooie jurk", "De verre reis", "Het zwarte paard", "Een zoete kers", "De vuile vaat", "Het oude schip", "Een vlijtige leerling", "De brede rivier", "Het natte gras", "Een vrolijk lied", "De slimme vos", "Het felle licht", "Een zoute drop", "De stalen brug", "Het dichte bos", "Een rustige plek", "De zwarte nacht", "Het ijzeren hek"];
        const gemiddeldeZinnen = ["De grote hond blaft luid.", "In de klas helpt de jonge leraar.", "Een vroege vogel zingt mooi.", "Het ronde balletje rolt weg.", "Achter de stal galoppeert het zwarte paard.", "De snelle trein vertrekt stipt.", "Een gouden ring blinkt mooi.", "De rustige baby slaapt zoet.", "In de tuin speelt een kleine kat.", "Mama kookt elke dag verse soep.", "De slimme jongen maakt zijn huiswerk.", "Het warme bed ligt heerlijk.", "Een groene appel is erg lekker.", "De vrolijke kinderen lachen hard.", "Een dikke krant ligt op de mat.", "Het witte huis staat op de berg.", "De sterke man tilt de doos.", "Een nieuwe fiets glimt in de zon.", "De lange weg loopt door het bos.", "Het kleine konijn eet een wortel.", "De boze buurman roept luid.", "Een zachte handdoek is fijn.", "De blauwe auto rijdt voorbij.", "Het scherpe mes snijdt goed.", "De oude opa vertelt een verhaal.", "Een grappige clown maakt muziek.", "De koude winter komt eraan.", "De gele banaan is krom.", "Het grijze wolkje drijft weg.", "Een mooie bloem bloeit nu.", "De vlijtige bij verzamelt veel nectar.", "In de keuken staat een glanzende pan.", "De trouwe hond wacht bij de poort.", "Een spannend boek ligt op de kast.", "De grijze olifant loopt door het park.", "In de winter draagt zij een wollen sjaal.", "De vriendelijke bakker verkoopt bruin brood.", "Een kleine vlieg zit op het raam.", "De harde wind waait door de takken.", "Papa drinkt elke ochtend warme koffie.", "De jonge plant krijgt elke dag water.", "Een houten vlot drijft op de beek.", "De paarse bloem ruikt heel erg lekker.", "In de schuur staat een oude tractor.", "De luie kat ligt op de zachte mat.", "Een zilveren lepel valt op de grond.", "De donkere wolk voorspelt een flinke bui.", "In het diepe water zwemt een grote vis.", "De grappige film duurt bijna twee uur.", "Een felle zon schijnt op het strand."];
        const moeilijkeZinnen = ["De prestigieuze ceremonie vond plaats in het elegante theater.", "Rond de middeleeuwse stadsmuren groeien de wilde, kleurrijke bloemen.", "De vriendelijke, oude buurman groet de nieuwe bewoners.", "De getalenteerde, jonge kunstenaar exposeert in de prestigieuze galerie.", "Het geavanceerde, digitale apparaat verwerkt de complexe gegevens.", "De internationale delegatie bezocht de hypermoderne faciliteiten.", "Een indrukwekkend landschap strekte zich uit voor de wandelaars.", "De historische architectuur trekt veel nieuwsgierige toeristen.", "Een innovatieve oplossing werd gevonden voor het technische probleem.", "De wetenschappelijke ontdekking veranderde de moderne wereld.", "Een mysterieuze schaduw verscheen in de donkere steeg.", "De enthousiaste vrijwilligers organiseerden een succesvol evenement.", "Een zeldzame vogelsoort werd gespot in het dichte woud.", "De verfijnde keuken biedt unieke culinaire ervaringen.", "Een ambitieus project vereist een nauwkeurige voorbereiding.", "De verontrustende resultaten veroorakten grote paniek bij de onderzoekers.", "Tijdens de jaarlijkse conferentie sprak de deskundige professor uitgebreid.", "De architecturale schoonheid van de kathedraal verbaasde de toeristen.", "Een mysterieuze mist bedekte het verlaten landschap volledig.", "De overtuigende bewijslast leidde tot een onmiddellijke veroordeling.", "Onze nieuwe buurman heeft een zeer indrukwekkende verzameling boeken.", "De technologische vooruitgang biedt talloze mogelijkheden voor de toekomst.", "Een onverwachte wending in het verhaal verraste de vele lezers.", "De diplomatische relaties tussen de landen bleven uiterst gespannen.", "Een zorgvuldige analyse van de feiten is absoluut noodzakelijk.", "De biologische diversiteit in het regenwoud neemt helaas snel af.", "Een efficiënte aanpak van het probleem bespaart veel kostbare tijd.", "De artistieke expressie van de schilder werd wereldwijd gewaardeerd.", "Een grootschalige renovatie van het ziekenhuis is inmiddels begonnen.", "De politieke besluitvorming verliep dit keer uiterst moeizaam.", "Een spectaculaire zonsondergang kleurde de hemel prachtig rood.", "De economische crisis had ingrijpende gevolgen voor de bevolking.", "Een gevaarlijke situatie ontstond door de hevige sneeuwval gisteren.", "De klassieke muziek zorgde voor een zeer ontspannen sfeer.", "Een wetenschappelijk experiment vereist een uiterst nauwkeurige observatie.", "De professionele fotograaf maakte enkele schitterende portretten vandaag.", "Een formele uitnodiging werd naar alle belangrijke gasten gestuurd.", "De culturele erfgoedlocatie wordt door de overheid streng bewaakt.", "Een complexe rekensom bleek een grote uitdaging voor de klas.", "De ambitieuze plannen werden door de commissie enthousiast ontvangen.", "Een plotselinge temperatuurdaling zorgde voor gladde wegen vannacht.", "De unieke combinatie van smaken was een ware sensatie.", "Een uitgebreide handleiding wordt bij het nieuwe apparaat geleverd.", "De sociale interactie tussen de leerlingen is erg belangrijk.", "Een krachtige motor drijft de zware machine moeiteloos aan.", "De financiële rapportage moet voor het einde van de maand klaar zijn.", "Een indringende geur verspreidde zich snel door het gebouw.", "De historische ontdekking wierp een nieuw licht op het verleden.", "Een creatieve oplossing werd door de jonge stagiair aangedragen.", "De juridische procedure kan helaas meerdere jaren in beslag nemen."];

        const lw_list = ['de', 'het', 'een'];
        const bnw_list = ['rode', 'grote', 'snelle', 'blauwe', 'kleine', 'warme', 'sterke', 'zachte', 'ronde', 'jonge', 'nieuwe', 'nieuw', 'dichte', 'hoge', 'verse', 'bruine', 'bruin', 'diepe', 'witte', 'scherp', 'scherpe', 'lange', 'volle', 'blije', 'grijze', 'open', 'zware', 'koude', 'lichte', 'vreemde', 'houten', 'korte', 'rijpe', 'dikke', 'gouden', 'mooie', 'verre', 'zwarte', 'zoete', 'vuile', 'oude', 'vlijtige', 'brede', 'natte', 'vrolijk', 'vrolijke', 'slimme', 'felle', 'zoute', 'stalen', 'rustige', 'ijzeren', 'vroege', 'groene', 'boze', 'zilveren', 'donkere', 'grappige', 'prestigieuze', 'elegante', 'middeleeuwse', 'wilde', 'kleurrijke', 'vriendelijke', 'getalenteerde', 'geavanceerde', 'digitale', 'complexe', 'internationale', 'hypermoderne', 'indrukwekkend', 'indrukwekkende', 'historische', 'nieuwsgierige', 'innovatieve', 'technische', 'wetenschappelijke', 'moderne', 'mysterieuze', 'enthousiaste', 'succesvol', 'zeldzame', 'verfijnde', 'unieke', 'culinaire', 'ambitieus', 'ambitieuze', 'nauwkeurige', 'verontrustende', 'jaarlijkse', 'deskundige', 'architecturale', 'verlaten', 'overtuigende', 'onmiddellijke', 'technologische', 'onverwachte', 'diplomatische', 'zorgvuldige', 'biologische', 'efficiënte', 'kostbare', 'artistieke', 'grootschalige', 'politieke', 'spectaculaire', 'economische', 'ingrijpende', 'gevaarlijke', 'hevige', 'klassieke', 'professionele', 'schitterende', 'formele', 'belangrijke', 'culturele', 'plotselinge', 'gladde', 'ware', 'uitgebreide', 'sociale', 'krachtige', 'financiële', 'indringende', 'creatieve', 'juridische', 'wollen', 'flinke', 'harde', 'gele', 'luie', 'paarse', 'ontspannen', 'glanzend', 'glanzende'];
        const znw_list = ['appel', 'boek', 'auto', 'lucht', 'kind', 'jas', 'man', 'kussen', 'tafel', 'hond', 'huis', 'deur', 'boom', 'brood', 'beer', 'zee', 'laken', 'potlood', 'weg', 'glas', 'vogel', 'muis', 'raam', 'tas', 'sneeuw', 'jasje', 'stoel', 'haar', 'banaan', 'kat', 'horloge', 'jurk', 'reis', 'paard', 'kers', 'vaat', 'schip', 'leerling', 'rivier', 'gras', 'lied', 'vos', 'licht', 'drop', 'brug', 'bos', 'plek', 'nacht', 'hek', 'klas', 'leraar', 'balletje', 'bal', 'stal', 'trein', 'ring', 'baby', 'tuin', 'soep', 'jongen', 'huiswerk', 'bed', 'kinderen', 'krant', 'mat', 'berg', 'doos', 'fiets', 'zon', 'konijn', 'wortel', 'buurman', 'handdoek', 'mes', 'verhaal', 'clown', 'muziek', 'winter', 'wolkje', 'bloem', 'bij', 'nectar', 'keuken', 'pan', 'poort', 'kast', 'olifant', 'park', 'sjaal', 'bakker', 'vlieg', 'wind', 'takken', 'papa', 'mama', 'ochtend', 'koffie', 'plant', 'dag', 'water', 'vlot', 'beek', 'schuur', 'tractor', 'lepel', 'grond', 'wolk', 'bui', 'vis', 'film', 'uur', 'strand', 'ceremonie', 'theater', 'stadsmuren', 'bloemen', 'bewoners', 'kunstenaar', 'galerie', 'apparaat', 'gegevens', 'delegatie', 'faciliteiten', 'landschap', 'wandelaars', 'architectuur', 'toeristen', 'oplossing', 'probleem', 'wereld', 'schaduw', 'steeg', 'vrijwilligers', 'evenement', 'vogelsoort', 'woud', 'ervaringen', 'project', 'voorbereiding', 'resultaten', 'paniek', 'onderzoekers', 'conferentie', 'professor', 'schoonheid', 'kathedraal', 'mist', 'bewijslast', 'veroordeling', 'verzameling', 'boeken', 'vooruitgang', 'mogelijkheden', 'toekomst', 'wending', 'verhaal', 'lezers', 'relaties', 'landen', 'analyse', 'feiten', 'diversiteit', 'regenwoud', 'aanpak', 'tijd', 'expressie', 'schilder', 'renovatie', 'ziekenhuis', 'besluitvorming', 'keer', 'zonsondergang', 'hemel', 'crisis', 'gevolgen', 'bevolking', 'situatie', 'sneeuwval', 'sfeer', 'experiment', 'observatie', 'fotograaf', 'portretten', 'uitnodiging', 'gasten', 'erfgoedlocatie', 'overheid', 'rekensom', 'uitdaging', 'plannen', 'commissie', 'temperatuurdaling', 'wegen', 'combinatie', 'smaken', 'sensatie', 'handleiding', 'interactie', 'leerlingen', 'motor', 'machine', 'rapportage', 'einde', 'maand', 'geur', 'gebouw', 'ontdekking', 'verleden', 'stagiair', 'procedure', 'jaren'];

        function analyzeSentence(sentence) {
            const rawWords = sentence.split(/\s+/);
            return rawWords.map((word) => {
                const clean = word.toLowerCase().replace(/[.,!?;:]/g, '');
                let type = null;
                if (lw_list.includes(clean)) type = 'lw';
                else if (bnw_list.includes(clean)) type = 'bnw';
                else if (znw_list.includes(clean)) type = 'znw';
                return { word, type };
            });
        }

        function updateLiveStyle() {
            const size = document.getElementById('lettergrootte').value;
            const spacing = document.getElementById('afstand').value;
            document.getElementById('val-lettergrootte').innerText = size + 'px';
            document.getElementById('val-afstand').innerText = spacing;
            const list = document.getElementById('exercise-list');
            const slist = document.getElementById('solution-list');
            if(list) { list.style.fontSize = size + 'px'; list.style.lineHeight = spacing; }
            if(slist) { slist.style.fontSize = size + 'px'; slist.style.lineHeight = spacing; }
        }

        function generateWorksheet() {
            const aantal = parseInt(document.getElementById('aantalOefeningen').value);
            const niveau = document.getElementById('moeilijkheid').value;
            const toonVoorbeeld = document.getElementById('voorbeeld').checked;
            const showLW = document.getElementById('lidwoord').checked;
            const showBNW = document.getElementById('bijvoeglijk').checked;
            const showZNW = document.getElementById('zelfstandig').checked;
            const container = document.getElementById('worksheet-content');

            let badgeText = [];
            if(showLW) badgeText.push("Lidwoord");
            if(showBNW) badgeText.push("Bijvoeglijk");
            if(showZNW) badgeText.push("Zelfstandig");
            document.getElementById('subtitel-badge').innerText = badgeText.join(" • ") || "Geen selectie";

            let bron = (niveau === 'eenvoudig') ? eenvoudigLijst : (niveau === 'makkelijk') ? gemiddeldeZinnen : moeilijkeZinnen;
            let geselecteerd = [...bron].sort(() => 0.5 - Math.random()).slice(0, aantal);

            const footerHTML = `<footer class="mt-12 text-right border-t border-gray-100 pt-4"><p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest">CC BY-NC-SA 4.0 NicoKlas</p></footer>`;

            let html = `<div class="mb-6"><p class="text-xs font-bold uppercase mb-2">Opdracht:</p><ul class="text-[11px] space-y-1">`;
            if (showLW) html += `<li>• Onderstreep de <span class="underline-demo">lidwoorden</span>.</li>`;
            if (showBNW) html += `<li>• Omcirkel de <span class="circle-demo">bijvoeglijke naamwoorden</span>.</li>`;
            if (showZNW) html += `<li>• Markeer de <span class="highlight-demo">zelfstandige naamwoorden</span> geel.</li>`;
            html += `</ul></div>`;

            if (toonVoorbeeld) {
                html += `<div class="example-box text-sm"><strong>Voorbeeld:</strong><br>`;
                const vbdText = (niveau === 'eenvoudig') ? "de kleine kat" : "De kleine kat speelt met een rode bal.";
                const vbd = analyzeSentence(vbdText);
                vbd.forEach(item => {
                    let txt = item.word;
                    if (item.type === 'lw' && showLW) txt = `<span class="underline-demo">${txt}</span>`;
                    if (item.type === 'bnw' && showBNW) txt = `<span class="circle-demo">${txt}</span>`;
                    if (item.type === 'znw' && showZNW) txt = `<span class="highlight-demo">${txt}</span>`;
                    html += txt + " ";
                });
                html += `</div>`;
            }

            html += `<div id="exercise-list" class="mt-8">`;
            geselecteerd.forEach((zin, i) => {
                html += `<div class="woord-blok">
                            <span class="text-[10px] font-bold text-gray-300 mr-2 uppercase">${(i+1).toString().padStart(2, '0')}</span> 
                            ${zin}
                         </div>`;
            });
            html += `</div>`;
            html += footerHTML;

            if (document.getElementById('verbeterblad').checked) {
                html += `<div style="page-break-before: always;" class="mt-20 border-t-2 border-dashed border-black pt-10">
                            <h2 class="text-xl font-black uppercase mb-8 text-center italic">Verbeterblad</h2>
                            <div id="solution-list">`;
                geselecteerd.forEach((zin, i) => {
                    const analyse = analyzeSentence(zin);
                    html += `<div class="woord-blok"><span class="text-[10px] font-bold text-gray-300 mr-2">${(i+1).toString().padStart(2, '0')}</span> `;
                    analyse.forEach(item => {
                        let txt = item.word;
                        if (item.type === 'lw' && showLW) txt = `<span class="underline-demo">${txt}</span>`;
                        if (item.type === 'bnw' && showBNW) txt = `<span class="circle-demo">${txt}</span>`;
                        if (item.type === 'znw' && showZNW) txt = `<span class="highlight-demo">${txt}</span>`;
                        html += txt + " ";
                    });
                    html += `</div>`;
                });
                html += `</div>${footerHTML}</div>`;
            }

            container.innerHTML = html;
            updateLiveStyle();
        }
    </script>
</body>
</html>
